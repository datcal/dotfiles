# SSH passphrase prompts go through KDE's ksshaskpass, which stores/retrieves the
# passphrase in KWallet — unlocked at login, remembered across reboots. This is the
# KDE equivalent of the GNOME "Passwords and Keys" (Seahorse/gnome-keyring) setup
# used on COSMIC. SSH_ASKPASS_REQUIRE=prefer makes ssh use the GUI dialog even when
# a terminal is present (OpenSSH 8.4+).
SSH_ASKPASS=/usr/bin/ksshaskpass
SSH_ASKPASS_REQUIRE=prefer
